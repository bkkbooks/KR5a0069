body:
  text: 太上洞真安竈經太上元始至尊登麟駕羽軒降崑崙之山金銀之壇座衆寶之臺時感十方三界神仙朝元拱御有炊母神母上言丹陛稱以夙生慶幸統御人間受北帝下部之職為五帝司命之官應天曹為直符之使變飲血茹毛之化就鍊生還熟之餐録世人功過之因上逐月晦朔之事每被凡情俗態觸犯者多敢以上言伏候聖㫖太上曰夫人宅者覆也屋者居也室者止也舍者吉也世上人民秪知峻宇雕墻妄施綺麗殊不知司命竈君主鎮中堂唯好清淨匡護黎民凡人若能慎護厨竈無令銅鐵刀斧之器飛禽走獸之毛不淨柴薪厭穢之水若犯忌諱能令家宅不安人口暴病其儀每月按祭竈吉日良夜可用鍋安淨水座布香茆列案焚香供養酒果召請五帝司命之主六癸神女之靈如對真靈宣示呪曰北帝上靈六癸神女臣今祭祀可以為主神水洋洋香燈齊舉仰望靈軒來臨醮所呪畢用柳枝沾水灑於醮席又呪曰泠泠陳月食精膳難思議五香清淨水芬芬柳灑之如是依經轉誦對聖披陳能保父慈子孝夫唱婦隨兄恭弟順尊卑稟序大小相承人凶歡恱家道昌隆骨肉安棲寢膳和泰豈慮靈神惡鬼興禍害人切忌髙聲大語觸諱胃殃厭穢腥膻無令觸犯即令引鬼招魔返受殃災於是明宣聖旨重宜偈曰道與生相保生與道相保安宅是安身愛身是愛道司命若歸依千邪無路到炊母六癸神飲食真神奧安靜和真和長生老非老是時上帝說經即畢三界群仙炊母神母願承聖㫖永當奉行太上洞真安竈經終
